    body { font-family: 'Lato', sans-serif; font-size: 18px; color: var(--text); background: linear-gradient(160deg, #eae6ff 0%, #fff 60%); min-height: 100vh; padding: 60px 20px 80px; }
    .quiz-wrap { max-width: 680px; margin: 0 auto; }
    h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 5vw, 3rem); font-weight: 700; color: var(--accent); margin-bottom: 40px; }
    .progress-wrap { margin-bottom: 28px; }
    .progress-label { font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.5px; }
    .progress-bar-bg { background: #e0dcf5; border-radius: 999px; height: 6px; overflow: hidden; }
    .progress-bar-fill { background: var(--accent); height: 100%; border-radius: 999px; transition: width 0.4s ease; }
    .question-card { background: #fff; border-radius: 12px; padding: 28px 32px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(64,50,148,0.08); border-left: 5px solid var(--accent); }
    .question-number { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }
    .question-text { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; line-height: 1.4; }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option label { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 8px; border: 2px solid #e0dcf5; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .option label:hover { border-color: var(--accent); background: #f4f2ff; }
    .option input[type="radio"] { accent-color: var(--accent); width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
    .option label.correct { border-color: var(--correct); background: #e8f5e9; color: var(--correct); font-weight: 700; }
    .option label.wrong { border-color: var(--wrong); background: #ffebee; color: var(--wrong); }
    .nav-wrap { display: flex; justify-content: center; gap: 12px; margin-top: 8px; }
    .nav-btn { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 14px 48px; font-family: 'Lato', sans-serif; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .nav-btn:hover { background: #5243aa; transform: translateY(-1px); }
    .nav-btn:disabled { background: #b0a8d9; cursor: default; transform: none; }
    .nav-btn.back { background: transparent; color: var(--accent); border: 2px solid var(--accent); }
    .nav-btn.back:hover { background: #f4f2ff; transform: translateY(-1px); }
    #review-section { display: none; }
    .review-header { text-align: center; margin-bottom: 32px; }
    .score { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--accent); font-weight: 700; }
    .score-msg { color: var(--muted); margin-top: 8px; font-size: 1rem; }
    .question-page { animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>

  const shuffledOptions = questions.map(q => shuffle([q.correct, ...q.wrong]));
  const answers = new Array(questions.length).fill(null);
  let current = 0;
  const total = questions.length;

  const questionContainer = document.getElementById('question-container');
  const nextBtn = document.getElementById('next-btn');
  const backBtn = document.getElementById('back-btn');
  const progressLabel = document.getElementById('progress-label');
  const progressBar = document.getElementById('progress-bar');

  function renderQuestion(index) {
    const q = questions[index];
    const opts = shuffledOptions[index];
    const isLast = index === total - 1;
    progressLabel.textContent = `Question ${index + 1} of ${total}`;
    progressBar.style.width = `${(index / total) * 100}%`;
    nextBtn.textContent = isLast ? 'Submit' : 'Next';
    nextBtn.disabled = answers[index] === null;
    backBtn.style.display = index > 0 ? 'inline-block' : 'none';
    questionContainer.innerHTML = `
      <div class="question-card question-page">
        <div class="question-number">Question ${index + 1}</div>
        <div class="question-text">${q.question}</div>
        <div class="options">
          ${opts.map(opt => `
            <div class="option">
              <label>
                <input type="radio" name="q${index}" value="${opt.replace(/"/g, '&quot;')}"
                  ${answers[index] === opt ? 'checked' : ''}>
                ${opt}
              </label>
            </div>
          `).join('')}
        </div>
      </div>
    `;
    document.querySelectorAll(`input[name="q${index}"]`).forEach(radio => {
      radio.addEventListener('change', () => {
        answers[index] = radio.value;
        nextBtn.disabled = false;
      });
    });
  }

  function showReview() {
    document.getElementById('quiz-section').style.display = 'none';
    const reviewSection = document.getElementById('review-section');
    reviewSection.style.display = 'block';
    let score = 0;
    let reviewHTML = '';
    questions.forEach((q, i) => {
      const opts = shuffledOptions[i];
      const chosen = answers[i];
      if (chosen === q.correct) score++;
      reviewHTML += `
        <div class="question-card">
          <div class="question-number">Question ${i + 1}</div>
          <div class="question-text">${q.question}</div>
          <div class="options">
            ${opts.map(opt => {
              let cls = '';
              if (opt === q.correct) cls = 'correct';
              else if (opt === chosen) cls = 'wrong';
              return `<div class="option"><label class="${cls}"><input type="radio" name="review-q${i}" ${chosen === opt ? 'checked' : ''} disabled>${opt}</label></div>`;
            }).join('')}
          </div>
        </div>`;
    });
    const percent = Math.round((score / total) * 100);
    const msgs = [
      { min: 100, msg: "Perfect score! You basically ARE Mily \uD83D\uDC14" },
      { min: 75,  msg: "Pretty good! You know Mily well \uD83C\uDF89" },
      { min: 50,  msg: "Not bad, but room to improve!" },
      { min: 1,   msg: "Oof. Do you even know Mily? \uD83D\uDE05" },
      { min: 0,   msg: "Zero?! Have you met Mily before?? \uD83D\uDC80" }
    ];
    const msg = msgs.find(m => percent >= m.min)?.msg || msgs[msgs.length - 1].msg;
    document.getElementById('score-text').textContent = `${score} / ${total} (${percent}%)`;
    document.getElementById('score-msg').textContent = msg;
    document.getElementById('review-container').innerHTML = reviewHTML;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  nextBtn.addEventListener('click', () => {
    if (answers[current] === null) return;
    if (current < total - 1) { current++; renderQuestion(current); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    else { showReview(); }
  });

  backBtn.addEventListener('click', () => {
    if (current > 0) { current--; renderQuestion(current); window.scrollTo({ top: 0, behavior: 'smooth' }); }
  });

  renderQuestion(0);
</script>
